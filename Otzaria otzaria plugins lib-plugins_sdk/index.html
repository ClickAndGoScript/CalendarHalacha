<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>לוח שנה עברי - תוסף דמו</title>
  <style>
    /* -----------------------------------------------------------------------
       Reset & CSS custom properties (overridden by applyTheme() at runtime)
    ----------------------------------------------------------------------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:    #1565C0;
      --onPrimary:  #ffffff;
      --surface:    #f8f9fa;
      --onSurface:  #1a1a2e;
      --outline:    #cbd5e1;
      --error:      #b71c1c;
      --radius:     12px;
      --font:       'Frank Ruhl Libre', 'David', serif;
    }

    body {
      font-family: var(--font);
      background: var(--surface);
      color: var(--onSurface);
      min-height: 100vh;
      direction: rtl;
    }

    /* -----------------------------------------------------------------------
       Layout
    ----------------------------------------------------------------------- */
    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: var(--primary);
      color: var(--onPrimary);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      font-weight: 700;
      user-select: none;
    }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* -----------------------------------------------------------------------
       Loading overlay
    ----------------------------------------------------------------------- */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      font-size: 1rem;
      z-index: 999;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 4px solid var(--outline);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* -----------------------------------------------------------------------
       Card
    ----------------------------------------------------------------------- */
    .card {
      background: #fff;
      border: 1px solid var(--outline);
      border-radius: var(--radius);
      padding: 18px 20px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* -----------------------------------------------------------------------
       Date grid
    ----------------------------------------------------------------------- */
    .date-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .date-cell {
      background: var(--surface);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .date-cell-label { font-size: .73rem; color: #777; margin-bottom: 3px; }
    .date-cell-value { font-size: 1rem; font-weight: 600; }

    /* -----------------------------------------------------------------------
       Zmanim table
    ----------------------------------------------------------------------- */
    .zmanim-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .9rem;
    }
    .zmanim-table tr { border-bottom: 1px solid var(--outline); }
    .zmanim-table tr:last-child { border-bottom: none; }
    .zmanim-table td { padding: 8px 4px; vertical-align: middle; }
    .zmanim-table td:last-child {
      text-align: left;
      font-variant-numeric: tabular-nums;
      color: #555;
    }

    /* -----------------------------------------------------------------------
       Events list
    ----------------------------------------------------------------------- */
    .events-list  { display: flex; flex-direction: column; gap: 10px; }
    .event-item   {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--surface);
    }
    .event-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--primary);
      margin-top: 5px;
      flex-shrink: 0;
    }
    .event-title { font-weight: 600; font-size: .95rem; }
    .event-desc  { font-size: .82rem; color: #555; margin-top: 2px; }

    /* -----------------------------------------------------------------------
       Empty / error states
    ----------------------------------------------------------------------- */
    .empty-state { text-align: center; color: #999; font-size: .88rem; padding: 16px 0; }

    /* -----------------------------------------------------------------------
       Publish section
    ----------------------------------------------------------------------- */
    .pub-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    #pub-result   { font-size: .85rem; color: #555; min-height: 20px; }

    /* -----------------------------------------------------------------------
       Search
    ----------------------------------------------------------------------- */
    .search-row { display: flex; gap: 8px; }

    .search-row input {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid var(--outline);
      border-radius: 8px;
      font-family: var(--font);
      font-size: .95rem;
      direction: rtl;
      outline: none;
      transition: border-color .2s;
    }
    .search-row input:focus { border-color: var(--primary); }

    .search-results { margin-top: 14px; display: flex; flex-direction: column; gap: 8px; }

    .search-result-item {
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--surface);
      cursor: pointer;
      transition: background .15s;
    }
    .search-result-item:hover { background: #e8eeff; }
    .sr-book { font-weight: 700; font-size: .84rem; color: var(--primary); }
    .sr-text { font-size: .88rem; margin-top: 3px; }

    /* -----------------------------------------------------------------------
       Buttons
    ----------------------------------------------------------------------- */
    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: var(--onPrimary);
      font-family: var(--font);
      font-size: .94rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
      white-space: nowrap;
    }
    .btn:hover    { opacity: .88; }
    .btn:disabled { opacity: .5; cursor: default; }

    .btn-outline {
      background: transparent;
      color: var(--primary);
      border: 1.5px solid var(--primary);
    }

    /* -----------------------------------------------------------------------
       Permissions chips
    ----------------------------------------------------------------------- */
    .perm-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .perm-chip {
      background: #e8f0fe;
      color: var(--primary);
      border-radius: 100px;
      padding: 3px 10px;
      font-size: .77rem;
      font-weight: 600;
    }

    /* -----------------------------------------------------------------------
       Storage
    ----------------------------------------------------------------------- */
    .storage-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    @media (max-width: 480px) {
      .date-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <span>טוען נתונים...</span>
</div>

<!-- App shell (hidden until boot) -->
<div class="app-shell" id="app" style="display:none">
  <header>
    <span>&#128197;</span>
    &#1500;&#1493;&#1495; &#1513;&#1504;&#1492; &#1506;&#1489;&#1512;&#1497; &#8212; &#1514;&#1493;&#1505;&#1507; &#1491;&#1502;&#1493;
  </header>

  <main>

    <!-- Date info -->
    <div class="card">
      <div class="card-title">&#128197; &#1514;&#1488;&#1512;&#1497;&#1498; &#1504;&#1493;&#1499;&#1495;&#1497;</div>
      <div class="date-grid">
        <div class="date-cell">
          <div class="date-cell-label">&#1500;&#1493;&#1506;&#1494;&#1497;</div>
          <div class="date-cell-value" id="greg-date">&#8212;</div>
        </div>
        <div class="date-cell">
          <div class="date-cell-label">&#1506;&#1489;&#1512;&#1497;</div>
          <div class="date-cell-value" id="heb-date">&#8212;</div>
        </div>
        <div class="date-cell">
          <div class="date-cell-label">&#1513;&#1504;&#1514; &#1492;&#1506;&#1493;&#1500;&#1501;</div>
          <div class="date-cell-value" id="heb-year">&#8212;</div>
        </div>
        <div class="date-cell">
          <div class="date-cell-label">&#1508;&#1500;&#1496;&#1508;&#1493;&#1512;&#1502;&#1492;</div>
          <div class="date-cell-value" id="platform">&#8212;</div>
        </div>

    <!-- Zmanim -->
    <div class="card">
      <div class="card-title">&#9201; &#1494;&#1502;&#1504;&#1497; &#1492;&#1497;&#1493;&#1501;</div>
      <table class="zmanim-table">
        <tbody id="zmanim-body">
          <tr><td colspan="2" class="empty-state">&#1496;&#1493;&#1506;&#1503; &#1494;&#1502;&#1504;&#1497;&#1501;...</td></tr>
        </tbody>
      </table>

    <!-- Events -->
    <div class="card">
      <div class="card-title">&#128203; &#1488;&#1497;&#1512;&#1493;&#1506;&#1497; &#1492;&#1500;&#1493;&#1495;</div>
      <div class="events-list" id="events-list">
        <div class="empty-state">&#1496;&#1493;&#1506;&#1503;...</div>
      </div>
    </div>

    <!-- Publish custom event -->
    <div class="card">
      <div class="card-title">&#128228; &#1508;&#1512;&#1505;&#1493;&#1501; &#1488;&#1497;&#1512;&#1493;&#1506; &#1502;&#1493;&#1514;&#1488;&#1501;</div>
      <p style="font-size:.87rem;color:#555;margin-bottom:12px;">
        &#1500;&#1495;&#1509; &#1499;&#1491;&#1497; &#1500;&#1508;&#1512;&#1505;&#1501; &#1488;&#1497;&#1512;&#1493;&#1506; &#1504;&#1497;&#1505;&#1497;&#1493;&#1504;&#1497; &#1500;&#1500;&#1493;&#1495; &#1492;&#1513;&#1504;&#1492; &#1513;&#1500; &#1488;&#1493;&#1510;&#1512;&#1497;&#1488;
        (&#1502;&#1513;&#1514;&#1502;&#1513; &#1489;-<code>publishedData.upsert</code>).
      </p>
      <div class="pub-controls">
        <button class="btn"             id="btn-publish">&#128204; &#1508;&#1512;&#1505;&#1501; &#1488;&#1497;&#1512;&#1493;&#1506;</button>
        <button class="btn btn-outline" id="btn-remove">&#128465; &#1492;&#1505;&#1512; &#1488;&#1497;&#1512;&#1493;&#1506;</button>
        <button class="btn btn-outline" id="btn-list-own">&#128203; &#1512;&#1513;&#1493;&#1502;&#1493;&#1514; &#1508;&#1506;&#1497;&#1500;&#1493;&#1514;</button>
      </div>
      <div id="pub-result"></div>
    </div>

    <!-- Full-text search -->
    <div class="card">
      <div class="card-title">&#128269; &#1495;&#1497;&#1508;&#1493;&#1513; &#1489;&#1505;&#1508;&#1512;&#1497;&#1497;&#1492;</div>
      <div class="search-row">
        <input type="text" id="search-input" placeholder="&#1495;&#1508;&#1513;... (&#1500;&#1491;&#1493;&#1490;&#1502;&#1492;: &quot;&#1513;&#1489;&#1514; &#1513;&#1500;&#1493;&#1501;&quot;)" />
        <button class="btn" id="btn-search">&#1495;&#1508;&#1513;</button>
      </div>
      <div id="search-results" class="search-results"></div>
    </div>

    <!-- Storage demo -->
    <div class="card">
      <div class="card-title">&#128190; &#1488;&#1495;&#1505;&#1493;&#1503; &#1508;&#1512;&#1496;&#1497;</div>
      <div class="storage-row">
        <span style="font-size:.9rem;">&#1499;&#1504;&#1497;&#1505;&#1493;&#1514;: <strong id="visit-count">0</strong></span>
        <button class="btn btn-outline" id="btn-reset-count">&#1488;&#1497;&#1508;&#1493;&#1505; &#1502;&#1493;&#1504;&#1492;</button>
      </div>
    </div>

    <!-- Permissions -->
    <div class="card">
      <div class="card-title">&#128272; &#1492;&#1512;&#1513;&#1488;&#1493;&#1514; &#1502;&#1488;&#1493;&#1513;&#1512;&#1493;&#1514;</div>
      <div class="perm-list" id="perm-list"></div>
    </div>

  </main>
</div>

<script>
'use strict';

// ---------------------------------------------------------------------------
// Constants
// ---------------------------------------------------------------------------
var DEMO_EVENT_KEY = 'demo:calendar-event:global-v1';

var HEBREW_MONTHS = [
  '', '\u05EA\u05E9\u05E8\u05D9','\u05D7\u05E9\u05D5\u05DF','\u05DB\u05E1\u05DC\u05D5','\u05D8\u05D1\u05EA','\u05E9\u05D1\u05D8','\u05D0\u05D3\u05E8','\u05E0\u05D9\u05E1\u05DF','\u05D0\u05D9\u05D9\u05E8','\u05E1\u05D9\u05D5\u05D5\u05DF',
  '\u05EA\u05DE\u05D5\u05D6','\u05D0\u05D1','\u05D0\u05DC\u05D5\u05DC',
];

var ZMAN_LABELS = {
  alotHaShachar:    '\u05E2\u05DC\u05D5\u05EA \u05D4\u05E9\u05D7\u05E8',
  sunrise:          '\u05D6\u05E8\u05D9\u05D7\u05D4',
  sofZmanKriatShema:'\u05E1\u05D5\u05E3 \u05D6\u05DE\u05DF \u05E7"\u05E9',
  sofZmanTefila:    '\u05E1\u05D5\u05E3 \u05D6\u05DE\u05DF \u05EA\u05E4\u05D9\u05DC\u05D4',
  chatzot:          '\u05D7\u05E6\u05D5\u05EA \u05D4\u05D9\u05D5\u05DD',
  minchaGedola:     '\u05DE\u05E0\u05D7\u05D4 \u05D2\u05D3\u05D5\u05DC\u05D4',
  minchaKetana:     '\u05DE\u05E0\u05D7\u05D4 \u05E7\u05D8\u05E0\u05D4',
  plagHaMincha:     '\u05E4\u05DC\u05D2 \u05D4\u05DE\u05E0\u05D7\u05D4',
  sunset:           '\u05E9\u05E7\u05D9\u05E2\u05D4',
  tzetHakochavim:   '\u05E6\u05D0\u05EA \u05D4\u05DB\u05D5\u05DB\u05D1\u05D9\u05DD',
  tzet:             '\u05E6\u05D0\u05EA \u05D4\u05DB\u05D5\u05DB\u05D1\u05D9\u05DD',
};

// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------
function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toHebrewDateStr(year, month, day) {
  return day + ' ' + (HEBREW_MONTHS[month] || month) + ' ' + year;
}

function fmtTime(iso) {
  if (!iso) return '\u2014';
  var d = new Date(iso);
  return isNaN(d.getTime()) ? iso
    : d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
}

// ---------------------------------------------------------------------------
// Theme application
// ---------------------------------------------------------------------------
function applyTheme(theme) {
  if (!theme || !theme.colorScheme) return;
  var cs = theme.colorScheme;
  var root = document.documentElement;
  root.style.setProperty('--primary',   cs.primary);
  root.style.setProperty('--onPrimary', cs.onPrimary);
  root.style.setProperty('--surface',   cs.surface);
  root.style.setProperty('--onSurface', cs.onSurface);
  root.style.setProperty('--outline',   cs.outline);
  root.style.setProperty('--error',     cs.error);
  if (theme.typography && theme.typography.fontFamily) {
    root.style.setProperty('--font', "'" + theme.typography.fontFamily + "', serif");
  }
}

// ---------------------------------------------------------------------------
// Boot — the single entry point for every Otzaria plugin
// ---------------------------------------------------------------------------
Otzaria.on('plugin.boot', function(payload) {
  applyTheme(payload.theme);
  showPermissions(payload.permissions);
  if (payload.app) {
    document.getElementById('platform').textContent = payload.app.platform || '\u2014';
  }

  Promise.all([loadCalendar(), loadStorage()]).then(function() {
    document.getElementById('loading-overlay').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
  });
});

Otzaria.on('theme.changed', applyTheme);
Otzaria.on('calendar.date_changed', loadCalendar);

// ---------------------------------------------------------------------------
// Calendar section
// ---------------------------------------------------------------------------
function loadCalendar() {
  return Promise.all([
    Otzaria.call('calendar.getSelectedDate'),
    Otzaria.call('calendar.getJewishDate'),
    Otzaria.call('calendar.getDailyTimes'),
    Otzaria.call('calendar.getEvents'),
  ]).then(function(results) {
    var dateRes = results[0];
    var jdRes   = results[1];
    var zmRes   = results[2];
    var evRes   = results[3];

    if (dateRes.success) {
      var d = new Date(dateRes.data);
      document.getElementById('greg-date').textContent =
        isNaN(d.getTime()) ? dateRes.data : d.toLocaleDateString('he-IL');
    }

    if (jdRes.success) {
      var jd = jdRes.data;
      document.getElementById('heb-date').textContent =
        toHebrewDateStr(jd.year, jd.month, jd.day);
      document.getElementById('heb-year').textContent = jd.year;
    }

    if (zmRes.success && zmRes.data) renderZmanim(zmRes.data);
    if (evRes.success)               renderEvents(evRes.data);
  });
}

function renderZmanim(times) {
  var tbody = document.getElementById('zmanim-body');
  var rows = [];
  for (var k in times) {
    if (times[k]) {
      var label = ZMAN_LABELS[k] || k;
      rows.push('<tr><td>' + label + '</td><td>' + fmtTime(times[k]) + '</td></tr>');
    }
  }
  tbody.innerHTML = rows.length
    ? rows.join('')
    : '<tr><td colspan="2" class="empty-state">\u05D0\u05D9\u05DF \u05E0\u05EA\u05D5\u05E0\u05D9 \u05D6\u05DE\u05E0\u05D9\u05DD</td></tr>';
}

function renderEvents(events) {
  var el = document.getElementById('events-list');
  if (!events || !events.length) {
    el.innerHTML = '<div class="empty-state">\u05D0\u05D9\u05DF \u05D0\u05D9\u05E8\u05D5\u05E2\u05D9\u05DD \u05DC\u05D4\u05D9\u05D5\u05DD</div>';
    return;
  }
  el.innerHTML = events.map(function(e) {
    return '<div class="event-item"><div class="event-dot"></div><div>'
      + '<div class="event-title">' + escHtml(e.title) + '</div>'
      + (e.description ? '<div class="event-desc">' + escHtml(e.description) + '</div>' : '')
      + '</div></div>';
  }).join('');
}

// ---------------------------------------------------------------------------
// Publish custom calendar event
// ---------------------------------------------------------------------------
document.getElementById('btn-publish').addEventListener('click', function() {
  Otzaria.call('calendar.getSelectedDate').then(function(dateRes) {
    var today = dateRes.success
      ? dateRes.data.substring(0, 10)
      : new Date().toISOString().substring(0, 10);

    return Otzaria.call('publishedData.upsert', {
      type:    'calendar.event',
      scope:   'global',
      key:     DEMO_EVENT_KEY,
      payload: {
        title:      '\u2B50 \u05D0\u05D9\u05E8\u05D5\u05E2 \u05DE\u05D4\u05EA\u05D5\u05E1\u05E3',
        startsAt:   today + 'T18:00:00+03:00',
        source:     '\u05EA\u05D5\u05E1\u05E3 \u05D3\u05DE\u05D5',
        importance: 'high',
      },
    });
  }).then(function(res) {
    document.getElementById('pub-result').textContent = res.success
      ? '\u2705 \u05D4\u05D0\u05D9\u05E8\u05D5\u05E2 \u05E4\u05D5\u05E8\u05E1\u05DD \u2014 \u05E2\u05D1\u05D5\u05E8 \u05DC\u05DC\u05D5\u05D7 \u05D4\u05E9\u05E0\u05D4 \u05DB\u05D3\u05D9 \u05DC\u05E8\u05D0\u05D5\u05EA \u05D0\u05D5\u05EA\u05D5!'
      : '\u274C \u05E9\u05D2\u05D9\u05D0\u05D4: ' + (res.error ? res.error.message : '');
  });
});

document.getElementById('btn-remove').addEventListener('click', function() {
  Otzaria.call('publishedData.remove', {
    type:  'calendar.event',
    scope: 'global',
    key:   DEMO_EVENT_KEY,
  }).then(function(res) {
    document.getElementById('pub-result').textContent = res.success
      ? '\uD83D\uDDD1\uFE0F \u05D4\u05D0\u05D9\u05E8\u05D5\u05E2 \u05D4\u05D5\u05E1\u05E8'
      : '\u274C \u05E9\u05D2\u05D9\u05D0\u05D4: ' + (res.error ? res.error.message : '');
  });
});

document.getElementById('btn-list-own').addEventListener('click', function() {
  Otzaria.call('publishedData.listOwn').then(function(res) {
    if (!res.success) {
      document.getElementById('pub-result').textContent = '\u274C ' + (res.error ? res.error.message : '');
      return;
    }
    var n = res.data ? res.data.length : 0;
    document.getElementById('pub-result').textContent = n
      ? '\uD83D\uDCCB ' + n + ' \u05E8\u05E9\u05D5\u05DE\u05D5\u05EA \u05E4\u05E2\u05D9\u05DC\u05D5\u05EA \u05DE\u05D4\u05EA\u05D5\u05E1\u05E3'
      : '\uD83D\uDCCB \u05D0\u05D9\u05DF \u05E8\u05E9\u05D5\u05DE\u05D5\u05EA \u05E4\u05E2\u05D9\u05DC\u05D5\u05EA';
  });
});

// ---------------------------------------------------------------------------
// Full-text search
// ---------------------------------------------------------------------------
document.getElementById('btn-search').addEventListener('click', doSearch);
document.getElementById('search-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

function doSearch() {
  var q = document.getElementById('search-input').value.trim();
  if (!q) return;

  var btn = document.getElementById('btn-search');
  var resultsEl = document.getElementById('search-results');

  btn.disabled = true;
  btn.textContent = '\u05DE\u05D7\u05E4\u05E9...';
  resultsEl.innerHTML = '<div class="empty-state">\u05DE\u05D7\u05E4\u05E9...</div>';

  Otzaria.call('search.fullText', { query: q, limit: 15 }).then(function(res) {
    btn.disabled = false;
    btn.textContent = '\u05D7\u05E4\u05E9';

    if (!res.success) {
      resultsEl.innerHTML = '<div class="empty-state" style="color:var(--error)">'
        + '\u05E9\u05D2\u05D9\u05D0\u05D4: ' + escHtml(res.error ? res.error.message : '') + '</div>';
      return;
    }

    if (!res.data || !res.data.length) {
      resultsEl.innerHTML = '<div class="empty-state">\u05DC\u05D0 \u05E0\u05DE\u05E6\u05D0\u05D5 \u05EA\u05D5\u05E6\u05D0\u05D5\u05EA</div>';
      return;
    }

    resultsEl.innerHTML = res.data.map(function(r) {
      return '<div class="search-result-item" data-book="' + escHtml(r.book) + '" data-index="' + r.index + '">'
        + '<div class="sr-book">' + escHtml(r.book) + '</div>'
        + '<div class="sr-text">' + escHtml((r.text || '').substring(0, 120)) + '\u2026</div>'
        + '</div>';
    }).join('');

    resultsEl.querySelectorAll('.search-result-item').forEach(function(item) {
      item.addEventListener('click', function() {
        Otzaria.call('reader.openBook', {
          bookId: item.dataset.book,
          index:  Number(item.dataset.index) || 0,
        });
      });
    });
  });
}

// ---------------------------------------------------------------------------
// Storage — visit counter
// ---------------------------------------------------------------------------
function loadStorage() {
  return Otzaria.call('storage.get', { key: 'visitCount' }).then(function(res) {
    var count = (res.success && res.data != null) ? Number(res.data) : 0;
    count++;
    document.getElementById('visit-count').textContent = count;
    return Otzaria.call('storage.set', { key: 'visitCount', value: count });
  });
}

document.getElementById('btn-reset-count').addEventListener('click', function() {
  Promise.all([
    Otzaria.call('storage.set',    { key: 'visitCount', value: 0 }),
    Otzaria.call('ui.showMessage', { message: '\u05D4\u05DE\u05D5\u05E0\u05D4 \u05D0\u05D5\u05E4\u05E1' }),
  ]).then(function() {
    document.getElementById('visit-count').textContent = '0';
  });
});

// ---------------------------------------------------------------------------
// Permissions display
// ---------------------------------------------------------------------------
function showPermissions(perms) {
  var el = document.getElementById('perm-list');
  if (!perms || !perms.length) {
    el.innerHTML = '<span style="color:#999;font-size:.85rem;">\u05D0\u05D9\u05DF \u05D4\u05E8\u05E9\u05D0\u05D5\u05EA</span>';
    return;
  }
  el.innerHTML = perms.map(function(p) {
    return '<span class="perm-chip">' + escHtml(p) + '</span>';
  }).join('');
}
</script>
</body>
</html>
