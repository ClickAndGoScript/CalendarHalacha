<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>לוח שנה עברי</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="lib/fonts/material-icons.css">
  <link rel="stylesheet" href="lib/fonts/roboto.css">
</head>
<body>
  <div id="app">
    <div class="calendar-container">
      <!-- Top Bar -->
      <div class="calendar-topbar">
        <div class="topbar-actions">
          <button class="icon-button" id="btn-today" title="היום">
            <span class="material-icons">today</span>
          </button>
          <button class="icon-button" id="btn-prev" title="חודש קודם">
            <span class="material-icons">chevron_right</span>
          </button>
          <button class="icon-button" id="btn-next" title="חודש הבא">
            <span class="material-icons">chevron_left</span>
          </button>
        </div>
        
        <div class="topbar-title" id="month-title">
          טוען...
        </div>
        
        <div class="topbar-view-toggle">
          <button class="toggle-button active" id="btn-month-view" data-view="month">
            חודש
          </button>
          <button class="toggle-button" id="btn-week-view" data-view="week">
            שבוע
          </button>
        </div>
      </div>

      <!-- Calendar Grid -->
      <div class="calendar-main">
        <!-- Day Names Row -->
        <div class="day-names">
          <div class="day-name">ראשון</div>
          <div class="day-name">שני</div>
          <div class="day-name">שלישי</div>
          <div class="day-name">רביעי</div>
          <div class="day-name">חמישי</div>
          <div class="day-name">שישי</div>
          <div class="day-name">שבת</div>
        </div>
        
        <!-- Calendar Days Grid -->
        <div class="calendar-grid" id="calendar-grid">
          <!-- Days will be generated by JavaScript -->
        </div>
      </div>
    </div>
  </div>

<script>
  // בדיקה: האם אנחנו בדפדפן רגיל (מחוץ לאוצריא)?
  if (typeof Otzaria === 'undefined') {
    console.warn("Otzaria original SDK not found. Loading Mock for development...");
    
    // יצירת ה-Mock ישירות בזיכרון
    window.Otzaria = {
      on: (event, cb) => {
        if (event === 'plugin.boot') {
          setTimeout(() => cb({
            theme: { mode: 'light', colorScheme: { primary: '#1565C0', surface: '#f8f9fa', onSurface: '#1a1a2e', primaryContainer: '#d1e4ff', onPrimaryContainer: '#001d35', secondaryContainer: '#e8f0fe', outlineVariant: '#cbd5e1' } },
            app: { platform: 'browser' },
            permissions: ['calendar.read']
          }), 100);
        }
      },
      call: async (method, payload) => {
        console.log(`[Mock API Call]: ${method}`, payload);
        if (method === 'calendar.getJewishDate') {
          return { success: true, data: { day: 10, month: 7, year: 5785, monthName: 'תשרי' } };
        }
        return { success: true, data: {} };
      }
    };
  }
</script>

<!-- טעינת הקוד הראשי - תמיד הגרסה המקומפלת -->
<script src="main.js" type="module"></script>
</body>
</html>
