<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>לוח שנה עברי</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="lib/fonts/material-icons.css">
</head>
<body>
  <div id="app"></div>

<script>
  if (typeof Otzaria === 'undefined') {
    console.warn('Otzaria SDK not found. Loading local mock.');

    const today = new Date();

    function mockHebrewDate(date) {
      const gregorian = new Date(date);
      return {
        day: gregorian.getDate(),
        month: ((gregorian.getMonth() + 6) % 12) + 1,
        year: gregorian.getFullYear() + 3760,
        monthName: 'תשרי',
        isLeapYear: false,
      };
    }

    window.Otzaria = {
      on: (event, cb) => {
        if (event === 'plugin.boot') {
          setTimeout(() => cb({
            theme: {
              mode: 'light',
              colorScheme: {
                primary: '#9b6f12',
                surface: '#fcf8f1',
                onSurface: '#302417',
                primaryContainer: '#edd8aa',
                onPrimaryContainer: '#392600',
                secondaryContainer: '#f5e5c8',
                onSecondaryContainer: '#382d18',
                surfaceContainer: '#f7efe2',
                surfaceContainerHighest: '#efe3cf',
                outline: '#8d7a63',
                outlineVariant: '#d8c7af',
                onSurfaceVariant: '#6f5e49'
              }
            },
            plugin: { id: 'mock', version: 'dev' },
            app: { platform: 'browser', version: 'dev', locale: 'he', textDirection: 'rtl' },
            permissions: ['calendar.read']
          }), 100);
        }
      },
      call: async (method, payload) => {
        console.log('[Mock API Call]', method, payload);
        if (method === 'calendar.getSelectedDate') {
          return { success: true, data: { date: today.toISOString() } };
        }
        if (method === 'calendar.getJewishDate') {
          return { success: true, data: mockHebrewDate(payload?.date ?? today.toISOString()) };
        }
        return { success: true, data: {} };
      }
    };
  }
</script>

<script src="main.js"></script>
</body>
</html>
